<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>script2vid — Pipeline</title>
<style>
  :root {
    --bg:       #0f172a;
    --surface:  #1e293b;
    --surface2: #334155;
    --border:   #475569;
    --text:     #e2e8f0;
    --text-dim: #94a3b8;
    --accent:   #6366f1;
    --blue:     #3b82f6;
    --amber:    #f59e0b;
    --green:    #10b981;
    --red:      #ef4444;
    --radius:   8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header / Nav ──────────────────────── */
  header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-size: 20px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo span { color: var(--accent); }

  nav {
    display: flex;
    gap: 4px;
  }
  nav a {
    padding: 8px 18px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    text-decoration: none;
    transition: all 0.15s;
  }
  nav a:hover { color: var(--text); background: var(--surface2); }
  nav a.active { color: #fff; background: var(--accent); }

  /* ── Layout ────────────────────────────── */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 24px;
  }

  .page-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 24px;
  }

  /* Two-column when wide enough */
  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  @media (max-width: 720px) {
    .columns { grid-template-columns: 1fr; }
  }

  /* ── Cards ─────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .card h3 {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  /* ── Form fields ───────────────────────── */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .field input, .field textarea, .field select {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* ── Toggles row ───────────────────────── */
  .toggles {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    transition: all 0.15s;
    user-select: none;
  }
  .toggle:hover { border-color: var(--text-dim); }
  .toggle.active {
    background: rgba(99, 102, 241, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  .toggle-check {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    transition: all 0.15s;
  }
  .toggle.active .toggle-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Drop zone ─────────────────────────── */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(99, 102, 241, 0.05);
  }
  .drop-zone-icon { font-size: 32px; margin-bottom: 8px; }
  .drop-zone-text { font-size: 14px; }
  .drop-zone-hint { font-size: 12px; margin-top: 6px; color: var(--border); }
  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .drop-zone.has-file {
    border-color: var(--green);
    background: rgba(16, 185, 129, 0.05);
  }
  .drop-zone.has-file .drop-zone-text { color: var(--green); }

  /* ── Buttons ───────────────────────────── */
  .btn {
    padding: 10px 22px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.15s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #4f46e5; }
  .btn-lg { padding: 14px 32px; font-size: 15px; }

  .start-row {
    margin-top: 24px;
    display: flex;
    justify-content: center;
  }

  /* ── Progress panel ────────────────────── */
  .progress-panel {
    margin-top: 28px;
    display: none;
  }
  .progress-panel.visible { display: block; }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .progress-status {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .status-running  { background: var(--blue); animation: pulse 1.5s infinite; }
  .status-completed { background: var(--green); }
  .status-failed   { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .progress-time {
    font-size: 13px;
    color: var(--text-dim);
  }

  /* ── Stage list ────────────────────────── */
  .stage-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 16px;
  }
  .stage-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    color: var(--text-dim);
    background: var(--surface);
  }
  .stage-item.completed {
    color: var(--green);
  }
  .stage-item.active {
    color: var(--blue);
    background: rgba(59, 130, 246, 0.1);
    font-weight: 600;
  }
  .stage-item.pending { opacity: 0.4; }
  .stage-icon { width: 18px; text-align: center; font-size: 14px; }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(59, 130, 246, 0.3);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Console log ───────────────────────── */
  .console-toggle {
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    margin-bottom: 8px;
    user-select: none;
  }
  .console-toggle:hover { color: var(--text); }

  .console {
    background: #0a0e1a;
    border: 1px solid var(--surface2);
    border-radius: var(--radius);
    padding: 14px;
    max-height: 300px;
    overflow-y: auto;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-dim);
    display: none;
  }
  .console.visible { display: block; }
  .console .line-stage { color: var(--accent); font-weight: 600; }
  .console .line-ok { color: var(--green); }
  .console .line-err { color: var(--red); }
  .console .line-info { color: var(--amber); }

  /* ── Result banner ─────────────────────── */
  .result-banner {
    margin-top: 16px;
    padding: 16px 20px;
    border-radius: var(--radius);
    display: none;
  }
  .result-banner.visible { display: block; }
  .result-banner.success {
    background: rgba(16, 185, 129, 0.1);
    border: 1px solid var(--green);
    color: var(--green);
  }
  .result-banner.error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid var(--red);
    color: var(--red);
  }
  .result-banner strong { display: block; font-size: 15px; margin-bottom: 6px; }
  .result-banner .result-detail { font-size: 13px; opacity: 0.85; }

  /* ── Job history ───────────────────────── */
  .job-history { margin-top: 32px; }
  .job-history h3 {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .job-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 6px;
    margin-bottom: 4px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .job-row:hover { background: var(--surface2); }
  .job-channel {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text-dim);
    font-weight: 600;
  }
  .job-title { flex: 1; }
  .job-status { font-weight: 600; font-size: 12px; }
  .job-status.running  { color: var(--blue); }
  .job-status.completed { color: var(--green); }
  .job-status.failed   { color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo"><span>script2vid</span></div>
  <nav>
    <a href="/" class="active">Pipeline</a>
    <a href="/calendar">Calendar</a>
  </nav>
</header>

<div class="container">
  <div class="page-title">New Video</div>

  <div class="columns">
    <!-- Left column: Channel + Script -->
    <div>
      <div class="card" style="margin-bottom:20px;">
        <h3>Channel &amp; Script</h3>

        <div class="field">
          <label>Channel</label>
          <select id="channel-select">
            <option value="">Select a channel...</option>
          </select>
        </div>

        <div class="field">
          <label>Title</label>
          <input id="input-title" placeholder="Video title (used for YouTube + file naming)" />
        </div>

        <div class="field">
          <label>Description</label>
          <textarea id="input-desc" placeholder="YouTube video description..."></textarea>
        </div>

        <div class="field">
          <label>Script</label>
          <div class="drop-zone" id="drop-zone">
            <input type="file" id="file-input" accept=".txt" />
            <div class="drop-zone-icon">📄</div>
            <div class="drop-zone-text">Drop a .txt script here or click to browse</div>
            <div class="drop-zone-hint">Plain text file</div>
          </div>
        </div>

        <div class="field">
          <label>Or paste script</label>
          <textarea id="input-script" placeholder="Paste your script text here..." style="min-height:120px;"></textarea>
        </div>
      </div>
    </div>

    <!-- Right column: Settings -->
    <div>
      <div class="card" style="margin-bottom:20px;">
        <h3>Pipeline Settings</h3>
        <p id="defaults-hint" style="font-size:12px;color:var(--text-dim);margin-bottom:14px;">
          Select a channel to load its defaults.
        </p>

        <div class="field">
          <label>Toggles</label>
          <div class="toggles">
            <div class="toggle" data-key="vertical" onclick="toggleSwitch(this)">
              <div class="toggle-check">✓</div> Vertical
            </div>
            <div class="toggle" data-key="captions" onclick="toggleSwitch(this)">
              <div class="toggle-check">✓</div> Captions
            </div>
            <div class="toggle" data-key="overlays" onclick="toggleSwitch(this)">
              <div class="toggle-check">✓</div> Overlays
            </div>
            <div class="toggle" data-key="publish" onclick="toggleSwitch(this)">
              <div class="toggle-check">✓</div> Auto-publish
            </div>
            <div class="toggle" data-key="fresh" onclick="toggleSwitch(this)">
              <div class="toggle-check">✓</div> Fresh run
            </div>
          </div>
        </div>

        <div class="field">
          <label>Quality</label>
          <select id="input-quality">
            <option value="final">Final (production)</option>
            <option value="draft">Draft (fast preview)</option>
          </select>
        </div>

        <div class="field">
          <label>Category</label>
          <select id="input-category">
            <option value="people">People & Blogs</option>
            <option value="education">Education</option>
            <option value="entertainment">Entertainment</option>
            <option value="howto">How-to & Style</option>
            <option value="news">News & Politics</option>
            <option value="science">Science & Technology</option>
            <option value="comedy">Comedy</option>
            <option value="film">Film & Animation</option>
            <option value="music">Music</option>
            <option value="gaming">Gaming</option>
          </select>
        </div>

        <div class="field">
          <label>Tags</label>
          <input id="input-tags" placeholder="comma, separated, tags" />
        </div>

        <div class="field">
          <label>Privacy</label>
          <select id="input-privacy">
            <option value="private">Private</option>
            <option value="unlisted">Unlisted</option>
            <option value="public">Public</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Start button -->
  <div class="start-row">
    <button class="btn btn-primary btn-lg" id="btn-start" disabled onclick="startPipeline()">
      Start Pipeline
    </button>
  </div>

  <!-- Progress panel -->
  <div class="progress-panel" id="progress-panel">
    <div class="card">
      <div class="progress-header">
        <div class="progress-status" id="progress-status">
          <span class="status-dot status-running"></span>
          <span>Running...</span>
        </div>
        <div class="progress-time" id="progress-time"></div>
      </div>

      <div class="stage-list" id="stage-list"></div>

      <div class="console-toggle" id="console-toggle" onclick="toggleConsole()">
        ▶ Show console log
      </div>
      <div class="console" id="console-log"></div>

      <div class="result-banner" id="result-banner"></div>
    </div>
  </div>

  <!-- Job history -->
  <div class="job-history" id="job-history"></div>
</div>

<script>
// ═════════════════════════════════════════════════════════════════
//  State
// ═════════════════════════════════════════════════════════════════
let channels = {};
let channelDefaults = {};
let activeJobId = null;
let pollTimer = null;

const STAGES = [
  'Script Analysis',
  'Text Overlays',
  'Footage Retrieval',
  'Voiceover Generation',
  'Caption Generation',
  'Timeline Assembly',
  'Video Rendering',
  'Calendar Assignment',
  'YouTube Publishing',
];

// ═════════════════════════════════════════════════════════════════
//  Init
// ═════════════════════════════════════════════════════════════════
async function init() {
  // Load channels
  const calRes = await fetch('/api/calendar');
  const cal = await calRes.json();
  channels = cal.channels || {};

  const sel = document.getElementById('channel-select');
  for (const [id, ch] of Object.entries(channels)) {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = ch.name;
    sel.appendChild(opt);
  }

  sel.addEventListener('change', onChannelChange);

  // Load any existing jobs
  loadJobs();

  // Check form validity
  updateStartBtn();
}

async function onChannelChange() {
  const chId = document.getElementById('channel-select').value;
  if (!chId) {
    channelDefaults = {};
    document.getElementById('defaults-hint').textContent = 'Select a channel to load its defaults.';
    updateStartBtn();
    return;
  }

  // Fetch channel defaults
  const res = await fetch(`/api/channels/${chId}/defaults`);
  channelDefaults = await res.json();

  document.getElementById('defaults-hint').textContent =
    `Loaded defaults for "${channels[chId]?.name || chId}". Adjust below to override.`;

  // Apply defaults to form
  applyDefaults(channelDefaults);
  updateStartBtn();
}

function applyDefaults(d) {
  // Toggles
  document.querySelectorAll('.toggle').forEach(el => {
    const key = el.dataset.key;
    if (key in d) {
      el.classList.toggle('active', !!d[key]);
    }
  });

  // Selects
  if (d.quality) document.getElementById('input-quality').value = d.quality;
  if (d.category) document.getElementById('input-category').value = d.category;
  if (d.privacy) document.getElementById('input-privacy').value = d.privacy;

  // Tags
  if (d.tags) document.getElementById('input-tags').value = d.tags;
}

// ═════════════════════════════════════════════════════════════════
//  Toggles
// ═════════════════════════════════════════════════════════════════
function toggleSwitch(el) {
  el.classList.toggle('active');
}

function getToggle(key) {
  const el = document.querySelector(`.toggle[data-key="${key}"]`);
  return el ? el.classList.contains('active') : false;
}

// ═════════════════════════════════════════════════════════════════
//  File drop zone
// ═════════════════════════════════════════════════════════════════
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
let uploadedScript = null;

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    uploadedScript = e.target.result;
    dropZone.classList.add('has-file');
    dropZone.querySelector('.drop-zone-text').textContent = file.name;
    dropZone.querySelector('.drop-zone-hint').textContent =
      `${uploadedScript.length.toLocaleString()} characters`;
    // Clear the paste box if they dropped a file
    document.getElementById('input-script').value = '';
    updateStartBtn();
  };
  reader.readAsText(file);
}

// ═════════════════════════════════════════════════════════════════
//  Form validation
// ═════════════════════════════════════════════════════════════════
document.getElementById('input-script').addEventListener('input', updateStartBtn);
document.getElementById('input-title').addEventListener('input', updateStartBtn);

function updateStartBtn() {
  const hasChannel = !!document.getElementById('channel-select').value;
  const hasScript = !!(uploadedScript || document.getElementById('input-script').value.trim());
  document.getElementById('btn-start').disabled = !(hasChannel && hasScript);
}

// ═════════════════════════════════════════════════════════════════
//  Start pipeline
// ═════════════════════════════════════════════════════════════════
async function startPipeline() {
  const channel = document.getElementById('channel-select').value;
  const scriptText = uploadedScript || document.getElementById('input-script').value.trim();
  const title = document.getElementById('input-title').value.trim();
  const description = document.getElementById('input-desc').value.trim();

  if (!channel || !scriptText) return;

  const body = {
    channel,
    script_text: scriptText,
    title: title || null,
    description: description || null,
    overrides: {
      vertical: getToggle('vertical'),
      captions: getToggle('captions'),
      overlays: getToggle('overlays'),
      publish:  getToggle('publish'),
      fresh:    getToggle('fresh'),
      quality:  document.getElementById('input-quality').value,
      category: document.getElementById('input-category').value,
      tags:     document.getElementById('input-tags').value,
      privacy:  document.getElementById('input-privacy').value,
    },
  };

  document.getElementById('btn-start').disabled = true;

  const res = await fetch('/api/pipeline/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const job = await res.json();
  activeJobId = job.id;

  // Show progress panel
  showProgress(job);

  // Start polling
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollJob, 2000);
}

// ═════════════════════════════════════════════════════════════════
//  Progress rendering
// ═════════════════════════════════════════════════════════════════
function showProgress(job) {
  const panel = document.getElementById('progress-panel');
  panel.classList.add('visible');
  renderProgress(job);
}

function renderProgress(job) {
  // Status
  const statusEl = document.getElementById('progress-status');
  const dotClass = job.status === 'completed' ? 'status-completed'
                 : job.status === 'failed' ? 'status-failed'
                 : 'status-running';
  const label = job.status === 'completed' ? 'Completed'
              : job.status === 'failed' ? 'Failed'
              : 'Running...';
  statusEl.innerHTML = `<span class="status-dot ${dotClass}"></span><span>${label}</span>`;

  // Time
  const timeEl = document.getElementById('progress-time');
  if (job.elapsed) {
    const mins = Math.floor(job.elapsed / 60);
    const secs = Math.floor(job.elapsed % 60);
    timeEl.textContent = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
  } else if (job.started_at) {
    const elapsed = Math.floor(Date.now() / 1000 - job.started_at);
    const mins = Math.floor(elapsed / 60);
    const secs = elapsed % 60;
    timeEl.textContent = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
  }

  // Stages
  const listEl = document.getElementById('stage-list');
  let html = '';
  for (const stage of STAGES) {
    const isCompleted = job.stages_completed.includes(stage);
    const isActive = job.current_stage === stage;
    const cls = isCompleted ? 'completed' : isActive ? 'active' : 'pending';
    const icon = isCompleted ? '✓'
               : isActive ? '<span class="spinner"></span>'
               : '○';
    html += `<div class="stage-item ${cls}">
      <span class="stage-icon">${icon}</span>
      ${stage}
    </div>`;
  }
  listEl.innerHTML = html;

  // Console log
  const consoleEl = document.getElementById('console-log');
  let logHtml = '';
  for (const line of (job.log || [])) {
    let cls = '';
    if (line.includes('STAGE') && line.includes('=')) cls = 'line-stage';
    else if (line.includes('CACHED')) cls = 'line-ok';
    else if (line.toLowerCase().includes('error')) cls = 'line-err';
    else if (line.includes('[Channel]') || line.includes('[Calendar]')) cls = 'line-info';
    logHtml += `<div class="${cls}">${escHtml(line)}</div>`;
  }
  consoleEl.innerHTML = logHtml;
  consoleEl.scrollTop = consoleEl.scrollHeight;

  // Result banner
  const banner = document.getElementById('result-banner');
  if (job.status === 'completed') {
    banner.className = 'result-banner visible success';
    let detail = '';
    if (job.output_path) detail += `<div class="result-detail">Video: ${escHtml(job.output_path)}</div>`;
    if (job.calendar_slot) detail += `<div class="result-detail">Calendar slot: ${escHtml(job.calendar_slot)}</div>`;
    if (job.youtube_url) detail += `<div class="result-detail">YouTube: <a href="${job.youtube_url}" target="_blank" style="color:var(--green)">${job.youtube_url}</a></div>`;
    banner.innerHTML = `<strong>Pipeline completed successfully!</strong>${detail}`;
  } else if (job.status === 'failed') {
    banner.className = 'result-banner visible error';
    banner.innerHTML = `<strong>Pipeline failed</strong><div class="result-detail">${escHtml(job.error || 'Unknown error')}</div>`;
  } else {
    banner.className = 'result-banner';
  }
}

async function pollJob() {
  if (!activeJobId) return;

  const res = await fetch(`/api/pipeline/jobs/${activeJobId}`);
  const job = await res.json();
  renderProgress(job);

  if (job.status !== 'running') {
    clearInterval(pollTimer);
    pollTimer = null;
    document.getElementById('btn-start').disabled = false;
    loadJobs();
  }
}

// ═════════════════════════════════════════════════════════════════
//  Console toggle
// ═════════════════════════════════════════════════════════════════
function toggleConsole() {
  const el = document.getElementById('console-log');
  const tog = document.getElementById('console-toggle');
  const visible = el.classList.toggle('visible');
  tog.textContent = visible ? '▼ Hide console log' : '▶ Show console log';
}

// ═════════════════════════════════════════════════════════════════
//  Job history
// ═════════════════════════════════════════════════════════════════
async function loadJobs() {
  const res = await fetch('/api/pipeline/jobs');
  const jobs = await res.json();

  const el = document.getElementById('job-history');
  if (!jobs.length) { el.innerHTML = ''; return; }

  let html = '<h3>Recent Jobs</h3>';
  for (const job of jobs.slice(0, 10)) {
    const time = new Date(job.started_at * 1000).toLocaleString();
    html += `<div class="job-row" onclick="viewJob('${job.id}')">
      <span class="job-channel">${job.channel}</span>
      <span class="job-title">${escHtml(job.title || 'Untitled')}</span>
      <span class="job-status ${job.status}">${job.status}</span>
      <span style="color:var(--text-dim);font-size:12px;">${time}</span>
    </div>`;
  }
  el.innerHTML = html;
}

async function viewJob(jobId) {
  activeJobId = jobId;
  const res = await fetch(`/api/pipeline/jobs/${jobId}`);
  const job = await res.json();
  showProgress(job);

  if (job.status === 'running' && !pollTimer) {
    pollTimer = setInterval(pollJob, 2000);
  }
}

// ═════════════════════════════════════════════════════════════════
//  Utilities
// ═════════════════════════════════════════════════════════════════
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ═════════════════════════════════════════════════════════════════
//  Boot
// ═════════════════════════════════════════════════════════════════
init();
</script>
